<div class="layout-row example-row layout-gap-l flex-100">
    <div class="layout-column example-column layout-gap-l">
        <kbq-alert [alertColor]="alertColors.Info" [alertStyle]="alertStyles.Colored" [compact]="true">
            <i aria-hidden="true" kbq-icon="kbq-circle-info_16" [color]="colors.Contrast"></i>
            <span class="cdk-visually-hidden">Информация:</span>
            {{ text }}
        </kbq-alert>

        <kbq-alert [alertColor]="alertColors.Warning" [alertStyle]="alertStyles.Colored" [compact]="true">
            <i aria-hidden="true" kbq-icon="kbq-triangle-exclamation_16" [color]="colors.Warning"></i>
            <span class="cdk-visually-hidden">Предупреждение:</span>
            {{ text }}
        </kbq-alert>
    </div>
    <div class="layout-column example-column layout-gap-l">
        <kbq-alert [alertColor]="alertColors.Error" [alertStyle]="alertStyles.Colored" [compact]="true">
            <i aria-hidden="true" kbq-icon="kbq-triangle-exclamation_16" [color]="colors.Error"></i>
            <span class="cdk-visually-hidden">Ошибка:</span>
            {{ text }}
        </kbq-alert>

        <kbq-alert [alertColor]="alertColors.Success" [alertStyle]="alertStyles.Colored" [compact]="true">
            <i aria-hidden="true" kbq-icon="kbq-circle-check_16" [color]="colors.Success"></i>
            <span class="cdk-visually-hidden">Успешно:</span>
            {{ text }}
        </kbq-alert>
    </div>
</div>
