<kbq-button-toggle-group #group1="kbqButtonToggleGroup" class="layout-margin-bottom-l" stretched [(ngModel)]="model">
    @for (toggle of group; track toggle) {
        <kbq-button-toggle [value]="$index">
            <i kbq-icon="kbq-briefcase_16"></i>
            <span>{{ toggle }}</span>
        </kbq-button-toggle>
    }
</kbq-button-toggle-group>

<kbq-button-toggle-group #group2="kbqButtonToggleGroup" class="layout-margin-bottom-l" stretched>
    @for (toggle of group; track toggle) {
        <kbq-button-toggle [checked]="$index === 1" [value]="$index">
            {{ toggle }}
        </kbq-button-toggle>
    }
</kbq-button-toggle-group>

<kbq-button-toggle-group #group3="kbqButtonToggleGroup" [stretched]="true">
    @for (toggle of group; track toggle) {
        <kbq-button-toggle [checked]="$index === 2" [value]="$index">
            <i kbq-icon="kbq-briefcase_16"></i>
        </kbq-button-toggle>
    }
</kbq-button-toggle-group>
