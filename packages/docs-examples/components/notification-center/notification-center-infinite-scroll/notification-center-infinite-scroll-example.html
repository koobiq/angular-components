<button
    #trigger="kbqNotificationCenterTrigger"
    kbq-button
    kbqNotificationCenterTrigger
    [popoverMode]="true"
    [popoverHeight]="'500px'"
    [scrolledToBottomOffset]="100"
>
    <i kbq-icon="{{ notificationService.silentMode.value ? 'kbq-bell-slash_16' : 'kbq-bell_16' }}"></i>
    Notifications
    @if (trigger.unreadItemsCounter | async; as unreadItems) {
        <kbq-badge [badgeColor]="'error'" [compact]="true">{{ unreadItems }}</kbq-badge>
    }
</button>
