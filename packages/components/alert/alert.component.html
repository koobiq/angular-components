@if (projectedIcon()) {
    <div class="kbq-alert__icon" [class.kbq-alert__icon_title]="title()">
        <ng-content select="[kbq-icon-item],[kbq-icon]" />
    </div>
}

<div class="kbq-alert__content" [class.kbq-alert__content_title]="title()">
    <ng-content select="[kbq-alert-title]" />

    <div class="kbq-alert__text">
        <ng-content />
    </div>

    @if (control()) {
        <div class="kbq-alert__button-stack" [class.kbq-alert__button-stack_has-button]="button()">
            <ng-content select="[kbq-alert-control]" />
        </div>
    }
</div>

@if (closeButton()) {
    <div class="kbq-alert__close-button" (click)="closed.emit()">
        <ng-content select="[kbq-alert-close-button]" />
    </div>
}
