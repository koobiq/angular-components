<ng-template>
    <div
        tabindex="-1"
        class="kbq-dropdown__panel"
        [class.kbq-dropdown__panel_nested]="parent"
        [class]="classList"
        [style.max-width.px]="panelMaxWidth()"
        [style.--kbq-dropdown-size-container-width-min]="panelMinWidthToken()"
        [@transformDropdown]="panelAnimationState"
        (@transformDropdown.done)="onAnimationDone($event)"
        (@transformDropdown.start)="onAnimationStart($event)"
        (click)="close()"
        (keydown)="handleKeydown($event)"
    >
        <div class="kbq-dropdown__content">
            <ng-content />
        </div>
        <ng-content select="[kbqDropdownFooter], kbq-dropdown-footer" />
    </div>
</ng-template>

<ng-content select="[kbqDropdownStaticContent]" />
